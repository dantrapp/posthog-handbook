name: Build

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "18 9 * * 1"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run build:smoke
      - run: npm run validate

